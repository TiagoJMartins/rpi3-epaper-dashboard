[tools]
python = "3.13"

[env]
_.python.venv = { path = ".venv" }

[tasks.deploy]
description = "Provision and deploy dashboard to Pi"
run = "uv run pyinfra -y rpi3 deploy.py"


[tasks.upgrade]
description = "Push to git and restart dashboard on Pi (pulls latest)"
run = """
git push
ssh rpi3 'sudo systemctl restart dashboard'
"""
[tasks.logs]
description = "Tail dashboard logs on Pi"
run = "ssh rpi3 'sudo journalctl -u dashboard -f'"

[tasks.restart]
description = "Restart dashboard on Pi"
run = "ssh rpi3 'sudo systemctl restart dashboard'"

[tasks.stop]
description = "Stop dashboard on Pi"
run = "ssh rpi3 'sudo systemctl stop dashboard'"

[tasks.status]
description = "Dashboard service status"
run = "ssh rpi3 'sudo systemctl status dashboard'"
